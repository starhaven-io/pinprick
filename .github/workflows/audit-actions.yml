name: Audit Actions

on:
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:
    inputs:
      action:
        description: "Add a new action (OWNER/REPO). Leave empty for a full scan."
        required: false
        default: ""
        type: string
      ref:
        description: "Tag or SHA to audit (e.g. v4.2.0). Defaults to the latest release."
        required: false
        default: ""
        type: string

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  group: audit-actions
  cancel-in-progress: false

permissions: {}

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore cargo cache (debug)
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-cargo-debug-

      - name: Build pinprick
        run: cargo build

      - name: Scan for new releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_ACTION: ${{ inputs.action }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          # Resolve a tag to its commit SHA, dereferencing annotated tags.
          resolve_tag_sha() {
            local owner="$1" repo="$2" tag="$3"
            local sha obj_type
            sha=$(gh api "repos/${owner}/${repo}/git/ref/tags/${tag}" --jq '.object.sha' 2>/dev/null || echo "")
            [[ -z "${sha}" ]] && return
            obj_type=$(gh api "repos/${owner}/${repo}/git/ref/tags/${tag}" --jq '.object.type' 2>/dev/null || echo "commit")
            if [[ "${obj_type}" == "tag" ]]; then
              sha=$(gh api "repos/${owner}/${repo}/git/tags/${sha}" --jq '.object.sha' 2>/dev/null || echo "${sha}")
            fi
            echo "${sha}"
          }

          # Filter: non-draft, non-prerelease, tag looks like a version number.
          # Rejects non-action tags like codeql-bundle-v2.25.1.
          VERSION_FILTER='.[] | select(.draft == false and .prerelease == false and (.tag_name | test("^v?\\d"))) | .tag_name'

          UPDATED=0
          if [[ -n "${INPUT_ACTION}" ]]; then
            if [[ "${INPUT_ACTION}" != */* ]]; then
              echo "error: expected OWNER/REPO, got '${INPUT_ACTION}'" >&2
              exit 1
            fi
            STUB="audited-actions/${INPUT_ACTION}.json"
            mkdir -p "$(dirname "${STUB}")"
            [[ -f "${STUB}" ]] || echo "[]" > "${STUB}"
            SCAN_FILES=("${STUB}")
          else
            SCAN_FILES=(audited-actions/*/*.json)
          fi
          for JSON_FILE in "${SCAN_FILES[@]}"; do
            OWNER=$(basename "$(dirname "${JSON_FILE}")")
            REPO=$(basename "${JSON_FILE}" .json)
            echo "--- ${OWNER}/${REPO} ---"
            declare -A TAG_SHAS=()

            if [[ -n "${INPUT_REF}" && -n "${INPUT_ACTION}" ]]; then
              # Specific ref: resolve and audit exactly this tag/SHA.
              TAG="${INPUT_REF}"
              if [[ "${TAG}" =~ ^[0-9a-f]{40}$ ]] || [[ "${TAG}" =~ ^[0-9a-f]{7}$ ]]; then
                TAG_SHA=$(gh api "repos/${OWNER}/${REPO}/commits/${TAG}" --jq '.sha' 2>/dev/null || echo "")
                if [[ -z "${TAG_SHA}" ]]; then
                  echo "  Could not resolve SHA '${TAG}', skipping"
                  continue
                fi
                TAG="sha:${TAG_SHA:0:7}"
              else
                TAG_SHA=$(resolve_tag_sha "${OWNER}" "${REPO}" "${TAG}")
                if [[ -z "${TAG_SHA}" ]]; then
                  echo "  Could not resolve ref '${TAG}', skipping"
                  continue
                fi
              fi
              TAGS=("${TAG}")
              declare -A TAG_SHAS=(["${TAG}"]="${TAG_SHA}")
            else
              # Check recent releases for unaudited versions.
              readarray -t TAGS < <(gh api "repos/${OWNER}/${REPO}/releases?per_page=10" \
                --jq "${VERSION_FILTER}" 2>/dev/null)
            fi

            if [[ ${#TAGS[@]} -eq 0 ]]; then
              echo "  No releases found, skipping"
              continue
            fi

            for TAG in "${TAGS[@]}"; do
              # Check by tag name first (no API call) to skip already-audited releases.
              if jq -e ".[] | select(.tag == \"${TAG}\")" "${JSON_FILE}" > /dev/null 2>&1; then
                echo "  ${TAG} already audited"
                continue
              fi

              # Resolve tag to SHA (skip if already resolved in the specific-ref path).
              if [[ -z "${TAG_SHAS["${TAG}"]+x}" ]]; then
                TAG_SHA=$(resolve_tag_sha "${OWNER}" "${REPO}" "${TAG}")
                if [[ -z "${TAG_SHA}" ]]; then
                  echo "  Could not resolve ${TAG}, skipping"
                  continue
                fi
              else
                TAG_SHA="${TAG_SHAS["${TAG}"]}"
              fi

              echo "  New release: ${TAG} (${TAG_SHA:0:7})"

              TMPDIR=$(mktemp -d)
              mkdir -p "${TMPDIR}/.github/workflows"
              cat > "${TMPDIR}/.github/workflows/test.yml" <<YAML
          name: test
          on: push
          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - uses: ${OWNER}/${REPO}@${TAG_SHA} # ${TAG}
          YAML

              if ./target/debug/pinprick --json audit "${TMPDIR}" 2>/dev/null; then
                echo "  Clean — adding ${TAG}"
                jq -r --arg sha "${TAG_SHA}" --arg tag "${TAG}" '
                  (if any(.[]; .sha == $sha) then . else [{sha: $sha, tag: $tag}] + . end)
                  | sort_by([(.tag | ltrimstr("v") | split(".") | map(tonumber? // 0)), .tag]) | reverse
                  | "[\n" + ([.[] | "  { \"sha\": \"\(.sha)\", \"tag\": \"\(.tag)\" }"] | join(",\n")) + "\n]"
                ' "${JSON_FILE}" > "${JSON_FILE}.tmp"
                mv "${JSON_FILE}.tmp" "${JSON_FILE}"
                UPDATED=1
              else
                echo "  Findings detected — skipping ${TAG}"
              fi
              rm -rf "${TMPDIR}"
            done
            unset TAG_SHAS
          done

          echo "updated=${UPDATED}" >> "${GITHUB_OUTPUT}"
        id: scan

      - name: Upload results
        if: steps.scan.outputs.updated == '1'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audited-actions
          path: audited-actions/

  update:
    name: Update
    needs: scan
    if: needs.scan.result == 'success'
    runs-on: ubuntu-slim
    environment:
      name: starhaven
      deployment: false
    permissions:
      contents: read
      actions: read # required by download-artifact
    steps:
      - name: Mint bot token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: audited-actions
          path: audited-actions/

      - name: Check for changes
        id: diff
        run: |
          # -N stages untracked files as intent-to-add so `git diff` sees them
          # as full-content additions; required for the dispatch-add path that
          # creates brand-new audited-actions/OWNER/REPO.json files.
          git add -N audited-actions/
          if git diff --quiet audited-actions/; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create signed commit and open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          INPUT_ACTION: ${{ inputs.action }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        run: |
          BOT_USER="${APP_SLUG}[bot]"
          BOT_ID=$(gh api "/users/${BOT_USER}" --jq .id)
          BASE_SHA=$(git rev-parse HEAD)

          if [[ -n "${INPUT_ACTION}" ]]; then
            SLUG="${INPUT_ACTION//\//-}"
            BRANCH="chore/audited-actions-add-${SLUG}"
            TITLE="chore(audited-actions): add ${INPUT_ACTION}"
            PR_BODY="Added \`${INPUT_ACTION}\` after a clean audit."
          else
            BRANCH="chore/audited-actions-update-$(date -u +%Y%m%d)"
            TITLE="chore(audited-actions): update scanned actions"
            PR_BODY="Automated scan found new clean releases for tracked actions."
          fi

          COMMIT_BODY="Signed-off-by: ${BOT_USER} <${BOT_ID}+${BOT_USER}@users.noreply.github.com>"

          # Trailer lines must be contiguous (no blank line between) so
          # `git interpret-trailers` parses both.
          if [[ "${EVENT_NAME}" == "workflow_dispatch" && -n "${TRIGGERING_ACTOR}" ]]; then
            ACTOR_NAME=$(gh api "/users/${TRIGGERING_ACTOR}" --jq '.name // .login')
            ACTOR_EMAIL=$(gh api "/users/${TRIGGERING_ACTOR}" --jq '.email // "\(.id)+\(.login)@users.noreply.github.com"')
            COAUTHOR="Co-authored-by: ${ACTOR_NAME} <${ACTOR_EMAIL}>"
            COMMIT_BODY="${COMMIT_BODY}"$'\n'"${COAUTHOR}"
          fi

          ADDITIONS=$(
            git diff --name-only HEAD -- audited-actions/ |
            while IFS= read -r file; do
              CONTENT=$(base64 < "$file" | tr -d '\n')
              jq -n --arg path "$file" --arg contents "$CONTENT" \
                '{path: $path, contents: $contents}'
            done | jq -s .
          )

          gh api "repos/${REPOSITORY}/git/refs" -X POST \
            -f "ref=refs/heads/${BRANCH}" \
            -f "sha=${BASE_SHA}"

          jq -n \
            --arg repo "${REPOSITORY}" \
            --arg branch "${BRANCH}" \
            --arg title "${TITLE}" \
            --arg body "${COMMIT_BODY}" \
            --arg head "${BASE_SHA}" \
            --argjson additions "${ADDITIONS}" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid url } } }",
              variables: {
                input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                  message: { headline: $title, body: $body },
                  fileChanges: { additions: $additions },
                  expectedHeadOid: $head
                }
              }
            }' | gh api graphql --input -

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "${TITLE}" \
            --body "${PR_BODY}"
