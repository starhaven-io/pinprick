name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  generate-matrix:
    name: Generate matrix
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate CI matrix
        id: matrix
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Push to main: run lint to warm the cache.
          if [[ "${EVENT_NAME}" == "push" ]]; then
            echo 'matrix=[{"name":"Lint","check":"lint","runner":"ubuntu-latest"}]' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          MATRIX='[{"name":"Conventional Commits","check":"commits","runner":"ubuntu-slim","fetch_depth":"0"}'

          # For title/body edits, only recheck conventional commits
          if [[ "${EVENT_ACTION}" == "edited" ]]; then
            echo "matrix=${MATRIX}]" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          CHANGED=$(git diff --name-only "${BASE_SHA}...HEAD")

          # Rust or build workflow changes: lint + test
          if echo "${CHANGED}" | grep -qE '\.rs$|^Cargo\.(toml|lock)$|^clippy\.toml$|^rustfmt\.toml$|^\.github/workflows/(ci|release)\.yml$'; then
            MATRIX+=',{"name":"Lint","check":"lint","runner":"ubuntu-latest"}'
            MATRIX+=',{"name":"Test (Linux)","check":"test","runner":"ubuntu-latest"}'
            MATRIX+=',{"name":"Test (Linux ARM)","check":"test","runner":"ubuntu-22.04-arm"}'
            MATRIX+=',{"name":"Test (macOS)","check":"test","runner":"macos-26"}'
          fi

          # Audited-actions changes: verify all entries
          if echo "${CHANGED}" | grep -qE '^audited-actions/'; then
            MATRIX+=',{"name":"Verify Audited Actions","check":"verify-audited","runner":"ubuntu-latest"}'
          fi

          # Site or audited-actions changes: format check + build
          if echo "${CHANGED}" | grep -qE '^site/|^audited-actions/'; then
            MATRIX+=',{"name":"Site","check":"site","runner":"ubuntu-slim"}'
          fi

          # Workflow changes: Actions security audit
          if echo "${CHANGED}" | grep -qE '^\.github/workflows/'; then
            MATRIX+=',{"name":"zizmor","check":"zizmor","runner":"ubuntu-latest"}'
          fi

          echo "matrix=${MATRIX}]" >> "${GITHUB_OUTPUT}"

  check:
    name: ${{ matrix.name }}
    needs: generate-matrix
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      pull-requests: read # required to fetch PR commits for conventional commit validation
      security-events: write # required for zizmor SARIF upload
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ matrix.fetch_depth || 1 }}
          persist-credentials: false

      # --- Cargo caches ---

      - name: Restore cargo build cache
        if: matrix.check == 'lint' || matrix.check == 'test'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-cargo-debug-

      - name: Restore lint tools cache
        if: matrix.check == 'lint'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-lint-tools-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-cargo-lint-tools-

      # --- Conventional Commits ---

      - name: Check PR title
        if: matrix.check == 'commits'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\(.+\))?: .+'
          if [[ ! "${PR_TITLE}" =~ ${PATTERN} ]]; then
            echo "::error::PR title '${PR_TITLE}' does not follow Conventional Commits."
            echo ""
            echo "Expected format: <type>(<scope>): <description>"
            echo ""
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore"
            echo ""
            echo "Examples:"
            echo "  feat(audit): add Docker FROM pattern detection"
            echo "  fix(pin): handle annotated tags correctly"
            echo "  ci: add clippy workflow"
            exit 1
          fi

      - name: Check commit messages
        if: matrix.check == 'commits'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\(.+\))?: .+'
          FAILED=0
          while IFS= read -r LINE; do
            SHA="${LINE%% *}"
            MSG="${LINE#* }"
            if [[ "${MSG}" == Merge\ * ]]; then
              continue
            fi
            if [[ ! "${MSG}" =~ ${PATTERN} ]]; then
              echo "::error::Commit ${SHA} does not follow Conventional Commits: '${MSG}'"
              FAILED=1
            fi
          done < <(git log --format="%h %s" "${BASE_SHA}..${HEAD_SHA}")

          if [[ "${FAILED}" -eq 1 ]]; then
            echo ""
            echo "All commit messages must follow: <type>(<scope>): <description>"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore"
            exit 1
          fi

      # --- Lint ---

      - name: Add Clippy and Rustfmt
        if: matrix.check == 'lint'
        run: rustup component add clippy rustfmt

      - name: Install typos-cli
        if: matrix.check == 'lint'
        run: cargo install typos-cli --locked --version 1.45.1

      - name: Install cargo-deny
        if: matrix.check == 'lint'
        run: cargo install cargo-deny --locked --version 0.19.4

      - name: Clippy
        if: matrix.check == 'lint'
        run: cargo clippy -- -D warnings

      - name: Rustfmt
        if: matrix.check == 'lint'
        run: cargo fmt -- --check

      - name: Typos
        if: matrix.check == 'lint'
        run: typos

      - name: Cargo deny
        if: matrix.check == 'lint'
        run: cargo deny check

      - name: Save cargo build cache
        if: matrix.check == 'lint' && github.event_name == 'push'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-debug-${{ hashFiles('**/Cargo.lock') }}

      - name: Save lint tools cache
        if: matrix.check == 'lint' && github.event_name == 'push'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-lint-tools-${{ hashFiles('**/Cargo.lock') }}

      # --- Test ---

      - name: Test
        if: matrix.check == 'test'
        run: cargo test

      # --- Site ---

      - name: Setup Node
        if: matrix.check == 'site'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Install site dependencies
        if: matrix.check == 'site'
        working-directory: site
        run: npm ci

      - name: Check formatting
        if: matrix.check == 'site'
        working-directory: site
        run: npm run format:check

      - name: Build site
        if: matrix.check == 'site'
        working-directory: site
        run: npm run build

      # --- Verify Audited Actions ---

      - name: Check sort order
        if: matrix.check == 'verify-audited'
        run: |
          FAILED=0
          for JSON_FILE in audited-actions/*/*.json; do
            SORTED=$(jq 'sort_by([(.tag | ltrimstr("v") | split(".") | map(tonumber? // 0)), .tag]) | reverse' "${JSON_FILE}")
            ACTUAL=$(jq '.' "${JSON_FILE}")
            if [[ "${SORTED}" != "${ACTUAL}" ]]; then
              echo "::error::${JSON_FILE} is not sorted by version"
              FAILED=1
            fi
          done
          exit "${FAILED}"

      - name: Build pinprick
        if: matrix.check == 'verify-audited'
        run: cargo build --release

      - name: Verify audited-actions entries
        if: matrix.check == 'verify-audited'
        run: |
          FAILED=0
          for JSON_FILE in audited-actions/*/*.json; do
            [[ "${JSON_FILE}" == *.json ]] || continue
            OWNER=$(basename "$(dirname "${JSON_FILE}")")
            REPO=$(basename "${JSON_FILE}" .json)
            echo "--- ${OWNER}/${REPO} ---"

            ENTRIES=$(jq -c '.[]' "${JSON_FILE}")
            while IFS= read -r ENTRY; do
              SHA=$(echo "${ENTRY}" | jq -r '.sha')
              TAG=$(echo "${ENTRY}" | jq -r '.tag')
              echo "  Verifying ${TAG} (${SHA:0:7})..."

              TMPDIR=$(mktemp -d)
              mkdir -p "${TMPDIR}/.github/workflows"
              cat > "${TMPDIR}/.github/workflows/test.yml" <<YAML
          name: test
          on: push
          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - uses: ${OWNER}/${REPO}@${SHA} # ${TAG}
          YAML

              if ! ./target/release/pinprick --json audit "${TMPDIR}" 2>/dev/null; then
                echo "::error::${OWNER}/${REPO}@${SHA} (${TAG}) has audit findings"
                FAILED=1
              fi
              rm -rf "${TMPDIR}"
            done <<< "${ENTRIES}"
          done
          exit "${FAILED}"

      # --- zizmor ---

      - name: Run zizmor
        if: matrix.check == 'zizmor'
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          persona: pedantic

  conclusion:
    name: conclusion
    needs: check
    runs-on: ubuntu-slim
    if: always()
    steps:
      - name: Result
        env:
          CHECK_RESULT: ${{ needs.check.result }}
        run: test "${CHECK_RESULT}" = "success"
