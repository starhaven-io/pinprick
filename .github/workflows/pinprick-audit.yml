name: pinprick audit

on:
  pull_request:
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/**"
  push:
    branches:
      - main

concurrency:
  group: "pinprick-audit-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore cargo cache (debug)
        id: cargo-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-cargo-debug-

      - name: Build pinprick
        run: cargo build

      - name: Save cargo cache (debug)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.cargo-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-debug-${{ hashFiles('**/Cargo.lock') }}

      - name: Run pinprick audit
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          ./target/debug/pinprick audit --sarif . > pinprick.sarif
          EXIT=$?
          # 0 = clean, 1 = findings (still upload), 2+ = real error
          if [[ "${EXIT}" -gt 1 ]]; then
            echo "::error::pinprick audit errored with exit code ${EXIT}"
            exit "${EXIT}"
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: pinprick.sarif
          category: pinprick
