name: Release

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build (${{ matrix.target }})
    environment:
      name: release
      deployment: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
          - target: aarch64-apple-darwin
            runner: macos-26
            sign: true
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      attestations: write # required to generate build provenance attestations
      id-token: write # required to generate build provenance attestations
    env:
      TEMPORARY_KEYCHAIN_FILE: "pinprick_signing.keychain-db"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create and unlock temporary macOS keychain
        if: matrix.sign
        run: |
          TEMPORARY_KEYCHAIN_PASSWORD="$(openssl rand -base64 20)"
          TEMPORARY_KEYCHAIN_PATH="${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"
          security create-keychain -p "${TEMPORARY_KEYCHAIN_PASSWORD}" "${TEMPORARY_KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${TEMPORARY_KEYCHAIN_PATH}"
          security unlock-keychain -p "${TEMPORARY_KEYCHAIN_PASSWORD}" "${TEMPORARY_KEYCHAIN_PATH}"

      - name: Import certificate into keychain
        if: matrix.sign
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          echo -n "${DEVELOPER_ID_CERTIFICATE}" | base64 --decode --output="${RUNNER_TEMP}/certificate.p12"
          security import "${RUNNER_TEMP}/certificate.p12" \
            -k "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}" \
            -P "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" \
            -t cert -f pkcs12 -A
          rm -f "${RUNNER_TEMP}/certificate.p12"
          security list-keychain -d user -s "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"

      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "${TARGET}"

      - name: Codesign binary
        if: matrix.sign
        env:
          TARGET: ${{ matrix.target }}
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}
        run: |
          codesign --sign "Developer ID Application: Patrick Linnane (${DEVELOPMENT_TEAM})" \
            --options runtime \
            "target/${TARGET}/release/pinprick"

      - name: Notarize binary
        if: matrix.sign
        env:
          TARGET: ${{ matrix.target }}
          APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}
        run: |
          mkdir -p "${RUNNER_TEMP}/notarize-staging"
          cp "target/${TARGET}/release/pinprick" "${RUNNER_TEMP}/notarize-staging/"
          ditto -c -k "${RUNNER_TEMP}/notarize-staging" "${RUNNER_TEMP}/pinprick-notarize.zip"
          xcrun notarytool submit "${RUNNER_TEMP}/pinprick-notarize.zip" \
            --apple-id "${APPLE_ID}" \
            --team-id "${DEVELOPMENT_TEAM}" \
            --password "${NOTARIZATION_PASSWORD}" \
            --wait

      - name: Clean up temporary keychain
        if: always() && matrix.sign
        run: |
          if [[ -f "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}" ]]; then
            security delete-keychain "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"
          fi

      - name: Package
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ARTIFACT="pinprick-${VERSION}-${TARGET}"
          mkdir -p staging
          cp "target/${TARGET}/release/pinprick" staging/
          cp LICENSE staging/
          tar czf "${ARTIFACT}.tar.gz" -C staging .
          echo "ARTIFACT=${ARTIFACT}" >> "${GITHUB_ENV}"

      - name: Generate build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: "${{ env.ARTIFACT }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT }}
          path: "${{ env.ARTIFACT }}.tar.gz"

  release:
    name: Release
    needs: build
    runs-on: ubuntu-slim
    permissions:
      contents: write # required to create tags and GitHub releases
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [[ -z "${VERSION}" ]]; then
            echo "::error::Could not extract version from Cargo.toml"
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh api "repos/${REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${TAG}" \
            -f "sha=${COMMIT_SHA}"

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --repo "${REPOSITORY}" \
            --title "${TAG}" \
            --generate-notes \
            artifacts/**/*.tar.gz
          gh release view "${TAG}" \
            --repo "${REPOSITORY}" \
            --json body \
            --jq '.body' > "${RUNNER_TEMP}/raw_notes.md"

      - name: Format release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          python3 scripts/format-release-notes.py \
            "${RUNNER_TEMP}/raw_notes.md" "${TAG}" \
            > "${RUNNER_TEMP}/formatted_notes.md"
          gh release edit "${TAG}" \
            --repo "${REPOSITORY}" \
            --notes-file "${RUNNER_TEMP}/formatted_notes.md"

  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: release
      deployment: false
    permissions:
      contents: read
      id-token: write # required to mint the OIDC token exchanged with crates.io
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify packageable
        run: cargo publish --dry-run

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish

  bump-cask:
    name: Bump Homebrew cask
    needs: release
    runs-on: macos-26
    environment:
      name: release
      deployment: false
    permissions: {}
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - name: Mint bot token for tap
        id: tap-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write

      - name: Bump Homebrew cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.tap-token.outputs.token }}
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_ENV_HINTS: 1
          APP_SLUG: ${{ steps.tap-token.outputs.app-slug }}
        run: |
          BOT_USER="${APP_SLUG}[bot]"
          BOT_ID=$(GH_TOKEN="${HOMEBREW_GITHUB_API_TOKEN}" gh api "/users/${BOT_USER}" --jq .id)
          export HOMEBREW_GIT_NAME="${BOT_USER}"
          export HOMEBREW_GIT_EMAIL="${BOT_ID}+${BOT_USER}@users.noreply.github.com"
          brew tap starhaven-io/homebrew-tap
          brew bump-cask-pr --no-fork --version "${VERSION}" starhaven-io/tap/pinprick
